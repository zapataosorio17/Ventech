<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Crear Cuenta | VenTech</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/Style/estilos.css">

</head>

<body class="bg-light">

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg bg-white shadow-sm">

        <div class="container">

            <a class="navbar-brand" href="index.html">

                <img src="/Imagen/logo.png" height="45" alt="VenTech">

            </a>

            <a href="login.html" class="btn btn-outline-primary">

                <i class="bi bi-box-arrow-in-right"></i>

                Iniciar Sesión

            </a>

        </div>

    </nav>

    <!-- Registro -->

    <section class="py-5">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-10">

                    <div class="card border-0 shadow-lg">

                        <div class="row g-0">

                            <!-- Imagen -->

                            <div class="col-lg-5 d-none d-lg-flex align-items-center justify-content-center text-white"
                                style="background:linear-gradient(135deg,#0d6efd,#18c2d9);">

                                <div class="text-center p-5">

                                    <img src="/Imagen/logo.png"
                                        width="180"
                                        class="mb-4">

                                    <h2 class="fw-bold">

                                        Únete a VenTech

                                    </h2>

                                    <p>

                                        Regístrate y disfruta de promociones,
                                        seguimiento de pedidos y una experiencia
                                        personalizada.

                                    </p>

                                </div>

                            </div>

                            <!-- Formulario -->

                            <div class="col-lg-7">

                                <div class="p-5">

                                    <h2 class="fw-bold mb-3">

                                        Crear Cuenta

                                    </h2>

                                    <p class="text-secondary mb-4">

                                        Completa la siguiente información.

                                    </p>

                                    <form>

                                        <div class="row">

                                            <div class="col-md-6 mb-3">

                                                <label class="form-label">

                                                    Nombres

                                                </label>

                                                <input
                                                    type="text"
                                                    class="form-control"
                                                    placeholder="Fabio Alejandro">

                                            </div>

                                            <div class="col-md-6 mb-3">

                                                <label class="form-label">

                                                    Apellidos

                                                </label>

                                                <input
                                                    type="text"
                                                    class="form-control"
                                                    placeholder="Zapata Osorio">

                                            </div>

                                        </div>

                                        <div class="row">

                                            <div class="col-md-6 mb-3">

                                                <label class="form-label">

                                                    Documento

                                                </label>

                                                <input
                                                    type="number"
                                                    class="form-control"
                                                    placeholder="123456789">

                                            </div>

                                            <div class="col-md-6 mb-3">

                                                <label class="form-label">

                                                    Teléfono

                                                </label>

                                                <input
                                                    type="tel"
                                                    class="form-control"
                                                    placeholder="3001234567">

                                            </div>

                                        </div>

                                        <div class="mb-3">

                                            <label class="form-label">

                                                Correo Electrónico

                                            </label>

                                            <input
                                                type="email"
                                                class="form-control"
                                                placeholder="correo@ejemplo.com">

                                        </div>

                                        <div class="row">

                                            <div class="col-md-6 mb-3">

                                                <label class="form-label">

                                                    Contraseña

                                                </label>

                                                <input
                                                    type="password"
                                                    class="form-control">

                                            </div>

                                            <div class="col-md-6 mb-3">

                                                <label class="form-label">

                                                    Confirmar Contraseña

                                                </label>

                                                <input
                                                    type="password"
                                                    class="form-control">

                                            </div>

                                        </div>

                                        <div class="mb-4 form-check">

                                            <input
                                                type="checkbox"
                                                class="form-check-input"
                                                id="terminos">

                                            <label
                                                class="form-check-label"
                                                for="terminos">

                                                Acepto los términos y condiciones.

                                            </label>

                                        </div>

                                        <button
                                            class="btn btn-primary btn-lg w-100">

                                            <i class="bi bi-person-plus-fill"></i>

                                            Crear Cuenta

                                        </button>

                                    </form>

                                    <hr class="my-4">

                                    <div class="text-center">

                                        ¿Ya tienes una cuenta?

                                        <a href="login.html"
                                            class="text-decoration-none fw-bold">

                                            Inicia Sesión

                                        </a>

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer class="bg-dark text-white text-center py-3">

        © 2026 VenTech - Todos los derechos reservados.

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/JS/registro.js"></script>

</body>

</html>
