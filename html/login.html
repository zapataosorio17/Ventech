<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Iniciar Sesión | VenTech</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="/Style/estilos.css">

</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg bg-white shadow-sm">

        <div class="container">

            <a class="navbar-brand fw-bold text-primary fs-3" href="index.html">

                <img src="logo.png" height="45" class="me-2">

            </a>

            <div>

                <a href="index.html" class="btn btn-outline-primary">

                    <i class="bi bi-house"></i>

                    Inicio

                </a>

            </div>

        </div>

    </nav>

    <section class="min-vh-100 d-flex align-items-center">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-10">

                    <div class="card border-0 shadow-lg overflow-hidden">

                        <div class="row g-0">

                            <!-- Imagen -->

                            <div class="col-lg-6 d-none d-lg-block">

                                <div class="h-100 text-white d-flex flex-column justify-content-center align-items-center p-5"
                                    style="background:linear-gradient(135deg,#0d6efd,#18c2d9);">

                                    <img src="/Imagen/logo.png" width="180" class="mb-4">

                                    <h2 class="fw-bold">

                                        Bienvenido a VenTech

                                    </h2>

                                    <p class="text-center">

                                        Compra la mejor tecnología con envíos rápidos,
                                        garantía y los mejores precios.

                                    </p>

                                </div>

                            </div>

                            <!-- Formulario -->

                            <div class="col-lg-6">

                                <div class="p-5">

                                    <h2 class="fw-bold mb-2">

                                        Iniciar Sesión

                                    </h2>

                                    <p class="text-secondary mb-4">

                                        Ingresa tus credenciales.

                                    </p>

                                    <form>

                                        <div class="mb-3">

                                            <label class="form-label">

                                                Correo electrónico

                                            </label>

                                            <div class="input-group">

                                                <span class="input-group-text">

                                                    <i class="bi bi-envelope"></i>

                                                </span>

                                                <input
                                                    type="email"
                                                    class="form-control"
                                                    placeholder="correo@ejemplo.com"
                                                    required>

                                            </div>

                                        </div>

                                        <div class="mb-3">

                                            <label class="form-label">

                                                Contraseña

                                            </label>

                                            <div class="input-group">

                                                <span class="input-group-text">

                                                    <i class="bi bi-lock"></i>

                                                </span>

                                                <input
                                                    type="password"
                                                    class="form-control"
                                                    placeholder="********"
                                                    required>

                                            </div>

                                        </div>

                                        <div class="d-flex justify-content-between mb-4">

                                            <div class="form-check">

                                                <input
                                                    class="form-check-input"
                                                    type="checkbox">

                                                <label class="form-check-label">

                                                    Recordarme

                                                </label>

                                            </div>

                                            <a href="#" class="text-decoration-none">

                                                ¿Olvidaste tu contraseña?

                                            </a>

                                        </div>

                                        <button
                                            class="btn btn-primary btn-lg w-100 mb-3">

                                            <i class="bi bi-box-arrow-in-right"></i>

                                            Ingresar

                                        </button>

                                    </form>

                                    <hr>

                                    <div class="text-center">

                                        <p>

                                            ¿No tienes cuenta?

                                        </p>

                                        <a href="registro.html"
                                            class="btn btn-outline-primary">

                                            Crear una cuenta

                                        </a>

                                    </div>

                                    <div class="text-center mt-4">

                                        <small class="text-secondary">

                                            © 2026 VenTech

                                        </small>

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/JS/login.js"></script>

</body>

</html>
